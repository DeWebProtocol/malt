name: Go

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test and vet
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build CLIs
        run: |
          mkdir -p bin
          go build -buildvcs=false -o bin/malt ./cmd/malt
          go build -buildvcs=false -o bin/malt-eval ./cmd/eval/malt-eval

      - name: Run smoke evaluation
        run: bin/malt-eval run --plan examples/eval-smoke-plan.json --run-id ci-smoke
